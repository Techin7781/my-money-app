<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายรับรายจ่าย (PWA)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="manifest" href="manifest.json">
<style>
body {font-family: sans-serif; margin:0; background:#f4f6f9;}
.container {padding:15px;}
h1 {text-align:center;}
.card {background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1);} 
input, select, button {width:100%; padding:10px; margin-top:8px; border-radius:10px; border:1px solid #ccc; font-size:16px;}
button {background:#4CAF50; color:white; border:none;}
.list-item {display:flex; justify-content:space-between; margin-top:10px; font-size:14px; align-items:center;}
.income {color:green;}
.expense {color:red;}
.small {font-size:12px; color:#666;}
.delete {background:red; color:white; border:none; padding:5px 8px; border-radius:8px; margin-left:10px;}
</style>
</head>
<body>
<div class="container">
<h1>💰 บัญชีรายรับรายจ่าย</h1>

<div class="card">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<select id="item">
<option>น้ำมะพร้าว</option>
<option>น้ำส้ม</option>
<option>น้ำมะนาว</option>
</select>

<input type="number" id="amount" placeholder="จำนวนเงิน">
<input type="date" id="date">
<button onclick="addData()">เพิ่มข้อมูล</button>
</div>

<div class="card">
<h3>💵 ยอดรวมทั้งหมด</h3>
<div id="total" style="font-size:20px; font-weight:bold; text-align:center;"></div>
</div>

<div class="card">
<h3>📋 รายการ</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📊 กราฟรวม</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🥤 กราฟตามเมนู</h3>
<canvas id="itemChart"></canvas>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || [];

window.onload = () => {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
};

function addData(){
  let type = document.getElementById('type').value;
  let item = document.getElementById('item').value;
  let amount = document.getElementById('amount').value;
  let date = document.getElementById('date').value;

  if(!amount) return alert('กรอกเงินก่อน');

  data.push({type, item, amount:parseFloat(amount), date});
  localStorage.setItem('data', JSON.stringify(data));
  document.getElementById('amount').value='';
  render();
}

function deleteItem(index){
  data.splice(index,1);
  localStorage.setItem('data', JSON.stringify(data));
  render();
}

function render(){
  let list = document.getElementById('list');
  list.innerHTML='';

  let income = 0, expense = 0;
  let items = {"น้ำมะพร้าว":0,"น้ำส้ม":0,"น้ำมะนาว":0};

  data.forEach((d,i) => {
    let div = document.createElement('div');
    div.className='list-item';
    div.innerHTML = `
      <div>
        <div>${d.item}</div>
        <div class="small">${d.date}</div>
      </div>
      <div>
        <span class="${d.type}">${d.type==='income'?'+':'-'}${d.amount}</span>
        <button class="delete" onclick="deleteItem(${i})">ลบ</button>
      </div>
    `;
    list.appendChild(div);

    if(d.type==='income'){
      income+=d.amount;
      items[d.item]+=d.amount;
    } else expense+=d.amount;
  });

  let total = income - expense;
  document.getElementById('total').innerText = `คงเหลือ: ${total.toFixed(2)} บาท`;

  drawChart(income, expense);
  drawItemChart(items);
}

let chart, itemChart;
function drawChart(income, expense){
  let ctx = document.getElementById('chart');
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['รายรับ','รายจ่าย'],
      datasets: [{data: [income, expense], backgroundColor: ['green','red']}]
    }
  });
}

function drawItemChart(items){
  let ctx = document.getElementById('itemChart');
  if(itemChart) itemChart.destroy();
  itemChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(items),
      datasets: [{
        label: 'ยอดขาย',
        data: Object.values(items)
      }]
    }
  });
}

render();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
